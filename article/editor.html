<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article Editor — ROUZHEN Studio</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  /* v0.5.0 Step 2：最小化 Editor，只验证 Asset 插入机制，不做 Meta/预览/保存 */

  body {
    padding: 0;
  }

  .editor-layout {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: none;
    margin: 0;
    padding: 0;
  }

  .editor-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--color-line);
    font-size: 14px;
    color: var(--color-muted);
  }

  .editor-main {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  .editor-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px;
    min-width: 0;
  }

  #articleTextarea {
    flex: 1;
    width: 100%;
    resize: none;
    border: 1px solid var(--color-line);
    border-radius: 8px;
    padding: 16px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 14px;
    line-height: 1.7;
    color: var(--color-text);
    background: #fff;
  }

  .asset-panel {
    width: 260px;
    flex-shrink: 0;
    border-left: 1px solid var(--color-line);
    padding: 16px;
    overflow-y: auto;
  }

  .asset-panel-title {
    font-size: 13px;
    color: var(--color-muted);
    margin: 0 0 12px;
  }

  .asset-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }

  .asset-thumb-btn {
    appearance: none;
    border: 1px solid var(--color-line);
    border-radius: 8px;
    padding: 0;
    background: #f0f0ec;
    cursor: pointer;
    overflow: hidden;
    aspect-ratio: 1;
    position: relative;
  }

  .asset-thumb-btn img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .asset-thumb-btn:active {
    opacity: 0.7;
  }

  .asset-thumb-btn--inserted::after {
    content: "已插入";
    position: absolute;
    inset: 0;
    background: rgba(43, 43, 40, 0.6);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
  }

  .asset-thumb-btn--disabled {
    cursor: not-allowed;
    opacity: 0.4;
  }

  .asset-panel-msg {
    font-size: 12px;
    color: var(--color-muted);
  }

  /* 手机端：改成上下堆叠，编辑器在上，素材面板在下（先满足能用，交互体验后续再打磨） */
  @media (max-width: 768px) {
    .editor-main {
      flex-direction: column;
    }
    .asset-panel {
      width: 100%;
      border-left: none;
      border-top: 1px solid var(--color-line);
      max-height: 220px;
    }
    .asset-grid {
      grid-template-columns: repeat(4, 1fr);
    }
  }
</style>
</head>
<body>

<div class="editor-layout">
  <div class="editor-header">
    <a href="/" style="color:inherit;">← Studio</a> ·
    Article Editor（v0.5.0 Step 2 测试版）· 点右侧缩略图，会在光标位置插入 <code>{{asset:id}}</code>
  </div>

  <div class="editor-main">
    <div class="editor-pane">
      <textarea id="articleTextarea" placeholder="在这里写文章正文，点右侧缩略图试试插入占位符…"></textarea>
    </div>

    <div class="asset-panel">
      <p class="asset-panel-title">最近上传</p>
      <div id="assetGrid" class="asset-grid"></div>
      <p id="assetMsg" class="asset-panel-msg"></p>
    </div>
  </div>
</div>

<script src="../js/editor.js"></script>
</body>
</html>
