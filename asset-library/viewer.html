<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>素材库 — 本地离线浏览</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f0f0ec; color: #1a1a1a; padding: 20px;
  }
  .container { max-width: 780px; margin: 0 auto; }
  h1 { font-size: 1.3rem; margin-bottom: 4px; }
  .meta { color: #8a8a82; font-size: 0.85rem; margin-bottom: 16px; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .btn { padding: 6px 12px; border-radius: 6px; border: 1px solid #ccc; background: #fff; cursor: pointer; font-size: 0.85rem; }
  .btn:hover { background: #f5f5f0; }
  .btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn-primary:hover { background: #333; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .search-input { padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.85rem; width: 160px; }

  /* 年份折叠 */
  .year-section { margin-bottom: 12px; }
  .year-header {
    display: flex; align-items: center; gap: 8px;
    font-size: 1.1rem; font-weight: 700; color: #1a1a1a;
    cursor: pointer; padding: 8px 0; user-select: none;
    border-bottom: 2px solid #ddd;
  }
  .year-header:hover { color: #555; }
  .year-arrow { transition: transform 0.2s; font-size: 0.8rem; }
  .year-header.open .year-arrow { transform: rotate(90deg); }
  .year-count { font-size: 0.8rem; color: #8a8a82; font-weight: 400; }
  .year-body { display: none; padding: 8px 0; }
  .year-body.open { display: block; }

  /* 月份折叠 */
  .month-section { margin-bottom: 8px; }
  .month-header {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.9rem; font-weight: 600; color: #555;
    cursor: pointer; padding: 4px 12px; user-select: none;
  }
  .month-header:hover { color: #1a1a1a; }
  .month-arrow { transition: transform 0.2s; font-size: 0.7rem; }
  .month-header.open .month-arrow { transform: rotate(90deg); }
  .month-count { font-size: 0.75rem; color: #8a8a82; font-weight: 400; }
  .month-body { display: none; padding: 8px 12px; }
  .month-body.open { display: block; }

  /* 图片网格 */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
  .card { border: 2px solid transparent; border-radius: 8px; overflow: hidden; cursor: pointer; background: #fff; transition: box-shadow 0.15s; }
  .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .card.selected { border-color: #1a1a1a; }
  .card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: #e8e8e4; }
  .card-info { padding: 3px 5px; font-size: 0.65rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 99; }
  .toast.show { opacity: 1; }
  .empty-hint { color: #8a8a82; font-size: 0.85rem; padding: 20px 0; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <h1>📁 本地素材库</h1>
  <p class="meta" id="metaInfo">加载中…</p>

  <div class="toolbar">
    <button class="btn" id="selectAllBtn">全选</button>
    <button class="btn btn-primary" id="copyBtn" disabled>复制 Markdown</button>
    <button class="btn" id="copyUrlsBtn" disabled>复制 URL</button>
    <button class="btn" id="expandAllBtn">全部展开</button>
    <input class="search-input" id="searchInput" type="text" placeholder="搜索文件名…">
  </div>

  <div id="gallery"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const gallery = document.getElementById("gallery");
const metaInfo = document.getElementById("metaInfo");
const selectAllBtn = document.getElementById("selectAllBtn");
const copyBtn = document.getElementById("copyBtn");
const copyUrlsBtn = document.getElementById("copyUrlsBtn");
const expandAllBtn = document.getElementById("expandAllBtn");
const searchInput = document.getElementById("searchInput");
const toastEl = document.getElementById("toast");

let library = null;
let selectedKeys = new Set();
let allExpanded = false;
let filterText = "";

// ------------------------------
// 加载
// ------------------------------
async function loadLibrary() {
  try {
    const resp = await fetch("./library.json");
    if (!resp.ok) throw new Error("无法读取 library.json");
    library = await resp.json();
    metaInfo.textContent = `共 ${library.total} 张素材 · 索引生成于 ${new Date(library.generated_at).toLocaleString("zh-CN")}`;
    render();
  } catch (err) {
    metaInfo.innerHTML = '<span style="color:#c00">加载失败：' + err.message + '</span><br>请确保 viewer.html 和 library.json 在同一目录。';
  }
}

// ------------------------------
// 渲染：年 → 月 两级折叠
// ------------------------------
function render() {
  // 按 年 → 月 → 日 分组
  const yearMonthMap = {}; // { "2026": { "07": [assets...] } }

  for (const asset of library.assets) {
    const date = asset.date || asset.upload_time.slice(0, 10);
    const year = date.slice(0, 4);
    const month = date.slice(5, 7);
    if (!yearMonthMap[year]) yearMonthMap[year] = {};
    if (!yearMonthMap[year][month]) yearMonthMap[year][month] = [];
    yearMonthMap[year][month].push(asset);
  }

  const sortedYears = Object.keys(yearMonthMap).sort((a, b) => b.localeCompare(a));
  gallery.innerHTML = "";

  if (sortedYears.length === 0) {
    gallery.innerHTML = '<p class="empty-hint">暂无素材</p>';
    return;
  }

  for (const year of sortedYears) {
    const months = yearMonthMap[year];
    const sortedMonths = Object.keys(months).sort((a, b) => b.localeCompare(a));
    const yearTotal = sortedMonths.reduce((sum, m) => sum + months[m].length, 0);

    // 年份区
    const yearSection = document.createElement("div");
    yearSection.className = "year-section";

    const yearHeader = document.createElement("div");
    yearHeader.className = "year-header";
    yearHeader.innerHTML = `<span class="year-arrow">▶</span> ${year}年 <span class="year-count">${yearTotal} 张</span>`;

    const yearBody = document.createElement("div");
    yearBody.className = "year-body";

    // 默认展开最新的年份
    if (year === sortedYears[0]) {
      yearHeader.classList.add("open");
      yearBody.classList.add("open");
    }

    yearHeader.addEventListener("click", () => {
      yearHeader.classList.toggle("open");
      yearBody.classList.toggle("open");
    });

    for (const month of sortedMonths) {
      const assets = months[month];
      const monthSection = document.createElement("div");
      monthSection.className = "month-section";

      const monthHeader = document.createElement("div");
      monthHeader.className = "month-header";
      monthHeader.innerHTML = `<span class="month-arrow">▶</span> ${month}月 <span class="month-count">${assets.length} 张</span>`;

      const monthBody = document.createElement("div");
      monthBody.className = "month-body";

      // 默认展开最新月份
      if (month === sortedMonths[0]) {
        monthHeader.classList.add("open");
        monthBody.classList.add("open");
      }

      monthHeader.addEventListener("click", (e) => {
        e.stopPropagation();
        monthHeader.classList.toggle("open");
        monthBody.classList.toggle("open");
      });

      // 图片网格
      const grid = document.createElement("div");
      grid.className = "grid";

      for (const asset of assets) {
        // 搜索过滤
        if (filterText && !asset.filename.toLowerCase().includes(filterText.toLowerCase())) {
          continue;
        }

        const card = document.createElement("div");
        card.className = "card" + (selectedKeys.has(asset.key) ? " selected" : "");
        card.dataset.key = asset.key;

        // 本地缩略图路径，失败则用远程 URL 兜底
        const thumbLocal = asset.thumbnail_key
          ? "./thumbnails/" + asset.thumbnail_key.replace("thumbnails/", "")
          : "";
        const thumbSrc = thumbLocal || asset.thumbnail_url || "";

        card.innerHTML = `
          <img src="${thumbSrc}" alt="${asset.filename}"
               onerror="this.onerror=null; this.src='${asset.thumbnail_url || "data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22150%22><rect fill=%22%23e8e8e4%22 width=%22150%22 height=%22150%22/><text x=%2275%22 y=%2280%22 text-anchor=%22middle%22 fill=%22%238a8a82%22 font-size=%2212%22>No Thumb</text></svg>'}">
          <div class="card-info" title="${asset.filename}">${asset.filename}</div>
        `;

        card.addEventListener("click", () => toggleSelect(asset.key));
        grid.appendChild(card);
      }

      monthSection.appendChild(monthHeader);
      monthSection.appendChild(monthBody);
      monthBody.appendChild(grid);
      yearBody.appendChild(monthSection);
    }

    yearSection.appendChild(yearHeader);
    yearSection.appendChild(yearBody);
    gallery.appendChild(yearSection);
  }
}

// ------------------------------
// 选中
// ------------------------------
function toggleSelect(key) {
  if (selectedKeys.has(key)) selectedKeys.delete(key);
  else selectedKeys.add(key);
  updateUI();
}

function updateUI() {
  document.querySelectorAll(".card").forEach(card => {
    card.classList.toggle("selected", selectedKeys.has(card.dataset.key));
  });
  copyBtn.disabled = selectedKeys.size === 0;
  copyUrlsBtn.disabled = selectedKeys.size === 0;
  selectAllBtn.textContent = selectedKeys.size === library.assets.length ? "取消全选" : "全选";
}

selectAllBtn.addEventListener("click", () => {
  if (selectedKeys.size === library.assets.length) selectedKeys.clear();
  else library.assets.forEach(a => selectedKeys.add(a.key));
  updateUI();
});

// ------------------------------
// 复制
// ------------------------------
copyBtn.addEventListener("click", async () => {
  const selected = library.assets.filter(a => selectedKeys.has(a.key));
  const text = selected.map(a => a.markdown || `![${a.filename}](${a.url})`).join("\n\n");
  await navigator.clipboard.writeText(text);
  showToast(`已复制 ${selected.length} 张图片的 Markdown`);
});

copyUrlsBtn.addEventListener("click", async () => {
  const selected = library.assets.filter(a => selectedKeys.has(a.key));
  const text = selected.map(a => a.url).join("\n");
  await navigator.clipboard.writeText(text);
  showToast(`已复制 ${selected.length} 个 URL`);
});

// ------------------------------
// 全部展开/收起
// ------------------------------
expandAllBtn.addEventListener("click", () => {
  allExpanded = !allExpanded;
  document.querySelectorAll(".year-header, .month-header").forEach(h => {
    h.classList.toggle("open", allExpanded);
  });
  document.querySelectorAll(".year-body, .month-body").forEach(b => {
    b.classList.toggle("open", allExpanded);
  });
  expandAllBtn.textContent = allExpanded ? "全部收起" : "全部展开";
});

// ------------------------------
// 搜索
// ------------------------------
searchInput.addEventListener("input", (e) => {
  filterText = e.target.value.trim();
  render();
});

// ------------------------------
// 工具
// ------------------------------
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  setTimeout(() => toastEl.classList.remove("show"), 2000);
}

loadLibrary();
</script>
</body>
</html>

  .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }

<div class="container">
  <h1>📁 本地素材库</h1>
  <p class="meta" id="metaInfo">加载中…</p>

  <div class="toolbar">
    <button class="btn" id="selectAllBtn">全选</button>
    <button class="btn btn-primary" id="copyBtn" disabled>复制选中 Markdown</button>
    <button class="btn" id="copyUrlsBtn" disabled>复制选中 URL</button>
  </div>

  <div id="gallery"></div>
  <p class="status" id="status"></p>
</div>

<div class="toast" id="toast"></div>

<script>
const gallery = document.getElementById("gallery");
const statusEl = document.getElementById("status");
const metaInfo = document.getElementById("metaInfo");
const selectAllBtn = document.getElementById("selectAllBtn");
const copyBtn = document.getElementById("copyBtn");
const copyUrlsBtn = document.getElementById("copyUrlsBtn");
const toastEl = document.getElementById("toast");

let library = null;
let selectedKeys = new Set();

async function loadLibrary() {
  try {
    const resp = await fetch("./library.json");
    if (!resp.ok) throw new Error("无法读取 library.json");
    library = await resp.json();
    metaInfo.textContent = `共 ${library.total} 张素材 · 索引生成于 ${new Date(library.generated_at).toLocaleString("zh-CN")}`;
    render();
  } catch (err) {
    metaInfo.innerHTML = '<span class="error">加载失败：' + err.message + '</span><br>请确保 viewer.html 和 library.json 在同一目录。';
  }
}

function render() {
  const groups = {};
  for (const asset of library.assets) {
    const date = asset.date || asset.upload_time.slice(0, 10);
    if (!groups[date]) groups[date] = [];
    groups[date].push(asset);
  }

  const sortedDates = Object.keys(groups).sort((a, b) => b.localeCompare(a));
  gallery.innerHTML = "";

  for (const date of sortedDates) {
    const header = document.createElement("div");
    header.className = "date-header";
    header.textContent = formatDate(date);
    gallery.appendChild(header);

    const grid = document.createElement("div");
    grid.className = "grid";

    for (const asset of groups[date]) {
      const card = document.createElement("div");
      card.className = "card" + (selectedKeys.has(asset.key) ? " selected" : "");
      card.dataset.key = asset.key;

      // 本地缩略图路径（相对路径）
      const thumbLocal = asset.thumbnail_key
        ? "./thumbnails/" + asset.thumbnail_key.replace("thumbnails/", "")
        : "";

      card.innerHTML = `
        <img src="${thumbLocal}" alt="${asset.filename}"
             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22150%22><rect fill=%22%23f0f0ec%22 width=%22150%22 height=%22150%22/><text x=%2275%22 y=%2280%22 text-anchor=%22middle%22 fill=%22%238a8a82%22 font-size=%2212%22>No Thumb</text></svg>'">
        <div class="card-info" title="${asset.filename}">${asset.filename}</div>
      `;

      card.addEventListener("click", () => toggleSelect(asset.key));
      grid.appendChild(card);
    }

    gallery.appendChild(grid);
  }
}

function toggleSelect(key) {
  if (selectedKeys.has(key)) selectedKeys.delete(key);
  else selectedKeys.add(key);
  updateUI();
}

function updateUI() {
  document.querySelectorAll(".card").forEach(card => {
    card.classList.toggle("selected", selectedKeys.has(card.dataset.key));
  });
  copyBtn.disabled = selectedKeys.size === 0;
  copyUrlsBtn.disabled = selectedKeys.size === 0;
  selectAllBtn.textContent = selectedKeys.size === library.assets.length ? "取消全选" : "全选";
}

selectAllBtn.addEventListener("click", () => {
  if (selectedKeys.size === library.assets.length) selectedKeys.clear();
  else library.assets.forEach(a => selectedKeys.add(a.key));
  updateUI();
});

copyBtn.addEventListener("click", async () => {
  const selected = library.assets.filter(a => selectedKeys.has(a.key));
  const text = selected.map(a => a.markdown || `![${a.filename}](${a.url})`).join("\n\n");
  await navigator.clipboard.writeText(text);
  showToast(`已复制 ${selected.length} 张图片的 Markdown`);
});

copyUrlsBtn.addEventListener("click", async () => {
  const selected = library.assets.filter(a => selectedKeys.has(a.key));
  const text = selected.map(a => a.url).join("\n");
  await navigator.clipboard.writeText(text);
  showToast(`已复制 ${selected.length} 个 URL`);
});

function formatDate(dateKey) {
  const today = new Date().toISOString().slice(0, 10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (dateKey === today) return "今天";
  if (dateKey === yesterday) return "昨天";
  return dateKey;
}

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  setTimeout(() => toastEl.classList.remove("show"), 2000);
}

loadLibrary();
</script>
