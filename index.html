<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROUZHEN Studio</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<main class="container">

  <header class="header">
    <h1>ROUZHEN Studio</h1>
    <nav class="nav">
      <a href="gallery.html" class="nav-link">素材库 (v0.3)</a>
      <a href="asset-library.html" class="nav-link">Asset Library (v0.3.1)</a>
      <a href="maintenance.html" class="nav-link">Maintenance</a>
    </nav>
  </header>

  <section class="upload-area">

    <input type="file" id="fileInput" accept="image/*" multiple hidden>

    <button id="selectBtn" class="btn btn-outline">选择图片</button>

    <p class="size-hint">支持多选，建议单张 10MB 以下</p>

    <div id="queueArea" class="queue-area" hidden></div>

    <button id="uploadBtn" class="btn btn-primary" disabled>上传</button>

  </section>

  <section id="resultArea" class="result-area" hidden>

    <div id="resultList" class="result-list"></div>

    <button id="copyUrlBtn" class="btn btn-outline">复制全部链接</button>
    <button id="copyMdBtn" class="btn btn-outline">复制全部 Markdown</button>

  </section>

  <p id="statusMsg" class="status-msg"></p>

</main>

<div id="tokenOverlay" class="overlay" hidden>
  <div class="overlay-card">
    <p class="overlay-text">请输入上传口令</p>
    <input id="tokenInput" class="token-input" type="password">
    <div class="overlay-actions">
      <button id="tokenCancelBtn" class="btn btn-outline" type="button">取消</button>
      <button id="tokenConfirmBtn" class="btn btn-primary" type="button">确认</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
